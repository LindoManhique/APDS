version: 2.1

jobs:
  build-and-test:
    docker:
      - image: cimg/node:18.0

    steps:
      - checkout

      # Install backend dependencies
      - run:
          name: Install backend dependencies
          command: |
            cd backend
            npm install

      # Install frontend dependencies
      - run:
          name: Install frontend dependencies
          command: |
            cd frontend
            npm install

      # Backend sanity check
      - run:
          name: Backend sanity check
          command: |
            cd backend
            node -e "console.log('Backend OK')"

      # Frontend build
      - run:
          name: Frontend build
          command: |
            cd frontend
            npm run build || true

      # Install SonarScanner
      - run:
          name: Install SonarScanner
          command: |
            curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
            unzip sonar-scanner.zip
            echo "export PATH=$PWD/sonar-scanner-5.0.1.3006-linux/bin:$PATH" >> $BASH_ENV

      # SonarCloud Scan (FIXED)
      - run:
          name: SonarCloud Scan
          command: |
            source $BASH_ENV

            sonar-scanner \
              -Dsonar.projectKey=LindoManhique_APDS \
              -Dsonar.organization=lindomanhique \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.token=$SONAR_TOKEN \
              -Dsonar.sources=backend,frontend \
              -Dsonar.sourceEncoding=UTF-8 \
              -Dsonar.coverage.exclusions=**/* \
              -Dsonar.scm.disabled=true \
              -Dsonar.scm.forceReloadAll=true

workflows:
  version: 2
  build-and-test-workflow:
    jobs:
      - build-and-test