version: 2.1

jobs:
  build-and-test:
    docker:
      - image: cimg/node:18.0

    steps:
      - checkout

      # =========================
      # BACKEND INSTALL + TESTS
      # =========================
      - run:
          name: Install backend dependencies
          command: |
            cd backend
            npm install

      - run:
          name: Run backend tests (with coverage)
          command: |
            cd backend
            npm test -- --coverage

      - run:
          name: Verify coverage file exists
          command: |
            ls backend/coverage || echo "WARNING: coverage folder missing"

      # =========================
      # FRONTEND INSTALL + BUILD
      # =========================
      - run:
          name: Install frontend dependencies
          command: |
            cd frontend
            npm install

      - run:
          name: Frontend build
          command: |
            cd frontend
            npm run build || echo "Frontend build warning ignored"

      # =========================
      # SONAR SCANNER INSTALL
      # =========================
      - run:
          name: Install SonarScanner
          command: |
            curl -sSLo sonar-scanner.zip https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
            unzip sonar-scanner.zip
            echo "export PATH=$PWD/sonar-scanner-5.0.1.3006-linux/bin:$PATH" >> $BASH_ENV

      # =========================
      # SONAR ANALYSIS
      # =========================
      - run:
          name: SonarCloud Scan
          command: |
            source $BASH_ENV

            sonar-scanner \
              -Dsonar.projectKey=LindoManhique_APDS \
              -Dsonar.organization=lindomanhique \
              -Dsonar.host.url=https://sonarcloud.io \
              -Dsonar.token=$SONAR_TOKEN \
              -Dsonar.sources=backend,frontend \
              -Dsonar.sourceEncoding=UTF-8 \
              -Dsonar.javascript.lcov.reportPaths=backend/coverage/lcov.info \
              -Dsonar.coverage.exclusions=**/* \
              -Dsonar.scm.disabled=true

workflows:
  version: 2
  build-and-test-workflow:
    jobs:
      - build-and-test